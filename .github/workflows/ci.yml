name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Carp
        uses: carpentry-org/setup-carp@v1

      - name: Build library
        run: carp -b expand.carp

      - name: Run tests
        run: carp -x test/expand.carp
